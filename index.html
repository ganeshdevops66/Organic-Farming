<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenHarvest Organic Farm</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #d4fc79, #96e6a1);
    scroll-behavior: smooth;
}

/* HEADER */
header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 80px 20px;
}

h2 {
    text-align: center;
}

/* SECTIONS */
.section {
    padding: 40px;
}

/* PRODUCTS GRID */
.products {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 220px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0px 5px 10px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 150px;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: #ff5722;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 10px;
}

/* ORDER SECTION */
.order {
    background: #ffffff;
    padding: 40px;
    text-align: center;
}

input {
    padding: 10px;
    width: 200px;
    margin: 10px;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    top: 0;
}

.popup-content {
    background: white;
    padding: 20px;
    margin: 10% auto;
    width: 300px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <h1>🌱 GreenHarvest Farms</h1>
    <p>Organic & Natural Products</p>
</header>

<!-- VEGETABLES -->
<section class="section">
<h2>🥬 Vegetables</h2>
<div class="products">

<div class="card">
<img src="https://source.unsplash.com/300x200/?vegetables">
<h3>Tomato</h3>
<button class="btn" onclick="selectProduct('Tomato')">View</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?carrot">
<h3>Carrot</h3>
<button class="btn" onclick="selectProduct('Carrot')">View</button>
</div>

</div>
</section>

<!-- FRUITS -->
<section class="section">
<h2>🍎 Fruits</h2>
<div class="products">

<div class="card">
<img src="https://source.unsplash.com/300x200/?apple">
<h3>Apple</h3>
<button class="btn" onclick="selectProduct('Apple')">View</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?banana">
<h3>Banana</h3>
<button class="btn" onclick="selectProduct('Banana')">View</button>
</div>

</div>
</section>

<!-- GRAINS & OILS -->
<section class="section">
<h2>🌾 Grains & Oils</h2>
<div class="products">

<div class="card">
<img src="https://source.unsplash.com/300x200/?rice">
<h3>Rice</h3>
<button class="btn" onclick="selectProduct('Rice')">View</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?oil">
<h3>Groundnut Oil</h3>
<button class="btn" onclick="selectProduct('Groundnut Oil')">View</button>
</div>

</div>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<h3 id="productName"></h3>
<p>100% Organic Product</p>
<button class="btn" onclick="orderNow()">Order Now</button>
<button class="btn" onclick="closePopup()">Close</button>
</div>
</div>

<!-- ORDER SECTION -->
<section class="order">
<h2>🛒 Order Product</h2>

<p>Selected Item: <b id="selectedItem">None</b></p>

<input type="text" placeholder="Your Name"><br>
<input type="text" placeholder="Mobile Number"><br>

<a id="whatsappLink" href="#" class="btn">Order via WhatsApp</a>
</section>

<script>
let selectedProduct = "";

function selectProduct(name) {
    selectedProduct = name;
    document.getElementById("productName").innerText = name;
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function orderNow() {
    document.getElementById("selectedItem").innerText = selectedProduct;

    let message = "Hello, I want to order " + selectedProduct;
    let link = "https://wa.me/919032870708?text=" + encodeURIComponent(message);

    document.getElementById("whatsappLink").href = link;

    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
