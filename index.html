<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenHarvest Organic Farm</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #d4fc79, #96e6a1);
}

.section {
    padding: 40px;
    text-align: center;
}

.products {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 220px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0px 5px 10px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 150px;
    border-radius: 10px;
}

.btn {
    background: #ff5722;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<section class="section">
<h2>🥬 Vegetables</h2>
<div class="products">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Bright_red_tomato_and_cross_section02.jpg">
<h3>Tomato</h3>
<button class="btn">View</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Carrot.jpg">
<h3>Carrot</h3>
<button class="btn">View</button>
</div>

</div>
</section>

<section class="section">
<h2>🍎 Fruits</h2>
<div class="products">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg">
<h3>Apple</h3>
<button class="btn">View</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg">
<h3>Banana</h3>
<button class="btn">View</button>
</div>

</div>
</section>

<section class="section">
<h2>🌾 Grains & Oils</h2>
<div class="products">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Rice_grains.jpg">
<h3>Rice</h3>
<button class="btn">View</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Olive_oil.jpg">
<h3>Oil</h3>
<button class="btn">View</button>
</div>

</div>
</section>

</body>
</html>
